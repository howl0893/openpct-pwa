name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        env:
          VITE_OPENPCT_GEOJSON_BASE_URL: ${{ vars.VITE_OPENPCT_GEOJSON_BASE_URL }}
          VITE_OPENPCT_LEAFLET_ICON_BASE_URL: ${{ vars.VITE_OPENPCT_LEAFLET_ICON_BASE_URL }}
          VITE_OPENPCT_GA_MEASUREMENT_ID: ${{ vars.VITE_OPENPCT_GA_MEASUREMENT_ID }}
          VITE_OPENPCT_GA_DEBUG: ${{ vars.VITE_OPENPCT_GA_DEBUG }}
        run: yarn build

      - name: Copy SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
